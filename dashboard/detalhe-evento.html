<head>
  <meta charset="UTF-8" />

  <title>ASTRAEA — Detalhe do Evento Solar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link rel="stylesheet" href="css/style.css" />
  <style>
    .back-btn {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.5em 1em;
      text-decoration: none;
      transition: all 0.2s;
      margin-top: 2rem;
    }
    .back-btn:hover {
      color: var(--text);
      border-color: var(--accent);
      text-decoration: none;
    }
    .detail-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      margin-top: 1.5rem;
    }
    .detail-field {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .detail-field:last-child { border-bottom: none; }
    .detail-field__label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .detail-field__value {
      font-family: var(--font-mono);
      color: var(--text);
    }
    .note-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--muted);
      font-style: italic;
      line-height: 1.6;
    }
  </style>
</head>
